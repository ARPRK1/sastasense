name: Keep SastaSense warm
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          for i in 1 2 3; do
            curl -fsS --max-time 90 https://sastasense.onrender.com/api/health && exit 0
            sleep 15
          done
          exit 0
